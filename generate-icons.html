<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Generar iconos Rayo</title></head>
<body style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;font-family:sans-serif;background:#f5f5f5">
<canvas id="c" style="border:2px dashed #ccc;border-radius:12px"></canvas>
<div style="display:flex;gap:12px">
<button onclick="draw(192)" style="padding:12px 24px;background:#2ecc71;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">Descargar 192×192</button>
<button onclick="draw(512)" style="padding:12px 24px;background:#2ecc71;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer">Descargar 512×512</button>
</div>
<p style="color:#666;font-size:14px">Haz clic en los botones para descargar los PNG. Luego colócalos en la carpeta del proyecto.</p>
<script>
function draw(size) {
  var c = document.getElementById("c");
  c.width = size; c.height = size;
  var ctx = c.getContext("2d");
  var cx = size / 2, cy = size / 2, r = size * 0.45;

  ctx.fillStyle = "#2ecc71";
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  var s = size / 100;
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.moveTo(54 * s, 8 * s);
  ctx.lineTo(17 * s, 58 * s);
  ctx.lineTo(46 * s, 58 * s);
  ctx.lineTo(42 * s, 92 * s);
  ctx.lineTo(83 * s, 42 * s);
  ctx.lineTo(54 * s, 42 * s);
  ctx.closePath();
  ctx.fill();

  var link = document.createElement("a");
  link.download = "icon-" + size + ".png";
  link.href = c.toDataURL("image/png");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
// Vista previa
draw(192);
</script>
</body>
</html>
